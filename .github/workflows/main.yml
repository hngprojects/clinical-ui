name: Clinical UI CI/CD

on:
  push:
    branches: [ staging, main ] # Removed 'dani', added 'staging'
  pull_request:
    branches: [ staging, main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      # Setup pnpm cache and CLI for the CI runner
      - uses: pnpm/action-setup@v3
        with:
          version: 8
          
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build

  deploy-staging:
    needs: ci
    if: github.ref == 'refs/heads/staging' # Updated to gate strictly for staging branch
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            cd ~/clinical-fe/staging
            git fetch origin
            git checkout staging
            git pull origin staging
            
            # Using pnpm as requested by lead
            pnpm install --production
            pnpm build
            pm2 restart 0 --update-env

  deploy-prod:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            cd ~/clinical-fe/prod
            git fetch origin
            git checkout main
            git pull origin main
            
            # Using pnpm as requested by lead
            pnpm install --production
            pnpm build
            pm2 restart 1 --update-env
