name: CI

on:
  push:
    branches: [dev, staging, main]
  pull_request:
    branches: [dev, staging, main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: CI / Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-workspace --ignore-scripts

      - name: Run linter
        run: pnpm lint
        continue-on-error: true

  test:
    name: CI / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-workspace --ignore-scripts

      - name: Run type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: 1

  ci:
    name: CI / Status
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: always() && needs.test.result == 'success'
    steps:
      - name: Verify all checks passed
        run: |
          echo "✓ Linter: ${{ needs.lint.result }}"
          echo "✓ Test & Build: ${{ needs.test.result }}"
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Critical checks failed"
            exit 1
          fi
          echo "✅ All CI checks passed successfully"
