name: Clinical UI CI/CD

on:
  push:
    branches: [dev, staging, main]
  pull_request:
    branches: [dev, staging, main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --ignore-workspace --ignore-scripts

      - name: Run linter
        run: pnpm lint
        continue-on-error: true

      - name: Run type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: 1

  deploy-staging:
    needs: ci
    environment: staging
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd /home/device_clinical_support/clinical-ui
            git fetch origin
            git checkout staging
            git pull origin staging
            pnpm install --ignore-workspace --ignore-scripts
            SKIP_ENV_VALIDATION=1 pnpm build
            pm2 restart staging-fe --update-env

  deploy-prod:
    needs: ci
    environment: production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd /home/device_clinical_support/clinical-ui-prod
            git fetch origin
            git checkout main
            git pull origin main
            pnpm install --ignore-workspace --ignore-scripts
            SKIP_ENV_VALIDATION=1 pnpm build
            pm2 restart production-fe --update-env
